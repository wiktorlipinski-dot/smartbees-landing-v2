document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  <script type="__bundler/template">
"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"67a9aa44-4c60-47b1-89ac-3272a44d2d72\"><\u002Fscript>\n<\u002Fhead>\n<body>\n<x-dc>\n<!-- @template name=\"SmartBees Landing — rytm teł (V2)\" description=\"Landing z naprzemiennym rytmem teł sekcji: ciemne / pomarańczowe / jasne\" -->\n<helmet>\n  <script src=\"7c36fe61-5a1f-4e7b-8fa0-7295f0f9009d\"><\u002Fscript>\n  <style>\n    #smartbees-lp-v2 { --text-secondary: #ffffff; }\n    #smartbees-lp-v2 .btn { border-radius: 10px; }\n    /* ===== marka: logo zamiast tekstowego wordmarku ===== */\n    #smartbees-lp-v2 .logo {\n      width: 132px;\n      height: 30px;\n      background-image: url(\"fea3036e-6de3-4874-bdab-5f8c8c03c5bd\");\n      background-repeat: no-repeat;\n      background-position: left center;\n      background-size: contain;\n      text-indent: -9999px;\n      overflow: hidden;\n      white-space: nowrap;\n    }\n    #smartbees-lp-v2 .logo i { display: none; }\n    #smartbees-lp-v2 .kicker { display: none; }\n\n    /* ===== motyw heksagonu (symbol SmartBees) ===== */\n    #smartbees-lp-v2 .hero-bullets li::before,\n    #smartbees-lp-v2 .feat-bullets li::before,\n    #smartbees-lp-v2 .price-list li::before {\n      border-radius: 0;\n      background: radial-gradient(circle at 34% 28%, #ff9166 0%, #eb5627 52%, #c23c0e 100%);\n      clip-path: polygon(50% 0%, 93.3% 25%, 93.3% 75%, 50% 100%, 6.7% 75%, 6.7% 25%);\n      filter: drop-shadow(0 1px 1.5px rgba(0, 0, 0, .35));\n    }\n\n    /* ===== form-card: mocniejszy efekt 3D, węższa ramka, uporządkowana stopka ===== */\n    #smartbees-lp-v2 .form-card {\n      max-width: 500px;\n      margin-left: auto;\n      box-shadow: 0 40px 70px -24px rgba(0, 0, 0, .55), 0 14px 28px -10px rgba(0, 0, 0, .45), inset 0 1px 0 rgba(255, 255, 255, .10);\n      border-color: rgba(255, 255, 255, .20);\n      transform: translateY(-4px);\n    }\n    #smartbees-lp-v2 .form-note { display: none; }\n    #smartbees-lp-v2 .form-alt .btn,\n    #smartbees-lp-v2 .form-alt > .phone-link { display: none; }\n\n    /* cennik: wyrównanie kart — karta wyróżniona nie skaluje się, więc CTA w jednej linii */\n    #smartbees-lp-v2 .price-card.featured { transform: none; }\n    #smartbees-lp-v2 .price-card.featured:hover { transform: translateY(-4px); }\n    #smartbees-lp-v2 .faq summary .fh {\n      border: none;\n      border-radius: 0;\n      clip-path: polygon(50% 0%, 93.3% 25%, 93.3% 75%, 50% 100%, 6.7% 75%, 6.7% 25%);\n      background: radial-gradient(circle at 35% 28%, rgba(235, 86, 39, .24), rgba(235, 86, 39, .10));\n      color: var(--accent);\n      transition: background .25s, color .25s, transform .25s;\n    }\n    #smartbees-lp-v2 .faq[open] summary .fh {\n      transform: none;\n      background: radial-gradient(circle at 35% 28%, #ff9166, #eb5627 55%, #c23c0e);\n      color: #fff;\n    }\n\n    /* ===== rytm teł: nadpisanie tokenów na opakowaniu sekcji ===== */\n    /* JASNE (kremowe) */\n    #smartbees-lp-v2 .theme-light {\n      color: var(--text);\n      --surface: #f4f2ec;\n      --surface-dim: #ffffff;\n      --surface-bright: #efece3;\n      --surface-high: #f8f6f1;\n      --surface-highest: #e7e3d9;\n      --text: #1c1c24;\n      --text-grey: #2c2d35;\n      --text-secondary: #5a5b64;\n      --text-muted: #8a8b93;\n      --outline: #d7d3c8;\n      --outline-dark: #e6e2d8;\n      --card-gradient: linear-gradient(94deg, #ffffff 1%, #faf8f3 97%);\n    }\n    /* POMARAŃCZOWE (mocny akcent marki) */\n    #smartbees-lp-v2 .theme-orange {\n      color: var(--text);\n      --surface: #d74114;\n      --surface-dim: #c2380f;\n      --surface-bright: #c95c31;\n      --surface-high: #cf5a2c;\n      --surface-highest: #b8360e;\n      --text: #ffffff;\n      --text-grey: #ffe9df;\n      --text-secondary: #ffd6c5;\n      --text-muted: #f0b49b;\n      --outline: rgba(255, 255, 255, .30);\n      --outline-dark: rgba(255, 255, 255, .16);\n      --card-gradient: linear-gradient(94deg, rgba(255, 255, 255, .12) 1%, rgba(255, 255, 255, .05) 97%);\n      --accent: #ffffff;\n      --accent-btn: #1c1c24;\n      --accent-btn-hover: #33343d;\n    }\n    /* w sekcjach pomarańczowych hex-punktory FAQ na jaśniej */\n    #smartbees-lp-v2 .theme-orange .faq summary .fh { background: radial-gradient(circle at 35% 28%, rgba(255, 255, 255, .30), rgba(255, 255, 255, .12)); color: #fff; }\n\n    /* ===== Stats: pełnoszerokościowy pas z liczbami (poza gridem) ===== */\n    #smartbees-lp-v2 [data-module=\"stats\"] .stats-grid {\n      width: 100vw;\n      margin-left: calc(50% - 50vw);\n      margin-top: 2.8rem;\n      gap: 0;\n      grid-template-columns: repeat(5, 1fr);\n      background: rgba(255, 255, 255, .015);\n      border-top: 1px solid var(--outline-dark);\n      border-bottom: 1px solid var(--outline-dark);\n    }\n    #smartbees-lp-v2 [data-module=\"stats\"] .stat {\n      display: flex;\n      flex-direction: column;\n      min-height: 250px;\n      padding: 2.6rem clamp(1.6rem, 3.2vw, 2.6rem) 2.4rem;\n      border-left: 1px solid var(--outline-dark);\n      transition: background .3s;\n    }\n    #smartbees-lp-v2 [data-module=\"stats\"] .stat:hover { background: rgba(235, 86, 39, .06); }\n    #smartbees-lp-v2 [data-module=\"stats\"] .stat:last-child { border-right: 1px solid var(--outline-dark); }\n    #smartbees-lp-v2 [data-module=\"stats\"] .stat > span { margin-top: auto; }\n    #smartbees-lp-v2 [data-module=\"stats\"] .stat-ico {\n      width: 42px; height: 42px; border-radius: 12px;\n      display: flex; align-items: center; justify-content: center;\n      background: rgba(235, 86, 39, .13); color: var(--accent);\n      margin-bottom: 1.3rem;\n    }\n    #smartbees-lp-v2 [data-module=\"stats\"] .stat b { margin-top: 0; }\n    @media (max-width: 1100px) {\n      #smartbees-lp-v2 [data-module=\"stats\"] .stats-grid { grid-template-columns: repeat(3, 1fr); }\n    }\n    @media (max-width: 640px) {\n      #smartbees-lp-v2 [data-module=\"stats\"] .stats-grid { grid-template-columns: repeat(2, 1fr); }\n    }\n\n    /* ===== Benefits: kafle z wycięciem-zakładką (numer w wycięciu PO PRAWEJ, eyebrow po lewej) ===== */\n    #smartbees-lp-v2 .ben-grid .card {\n      position: relative; overflow: visible;\n      background: transparent; border: none;\n      padding: 72px 1.7rem 1.9rem;\n    }\n    #smartbees-lp-v2 .ben-grid .card::before {\n      content: \"\"; position: absolute; inset: 0; z-index: 0;\n      background: var(--card-gradient);\n      clip-path: polygon(0 0, calc(100% - 92px) 0, calc(100% - 92px) 56px, 100% 56px, 100% 100%, 0 100%);\n    }\n    #smartbees-lp-v2 .ben-grid .card > * { position: relative; z-index: 1; }\n    #smartbees-lp-v2 .ben-grid .card .ben-top {\n      position: absolute; top: 0; right: 0; left: auto; margin: 0;\n      width: 92px; height: 56px;\n      display: flex; align-items: center; justify-content: center;\n    }\n    #smartbees-lp-v2 .ben-grid .card .ben-num { line-height: 1; }\n    #smartbees-lp-v2 .ben-grid .card .ben-eyebrow {\n      position: absolute; top: 0; left: 1.7rem; height: 56px;\n      display: flex; align-items: center;\n      font: 600 .72rem/1 var(--font-body); letter-spacing: .13em; text-transform: uppercase; color: var(--accent);\n    }\n\n    /* ostatni kafelek: wyróżniony CTA prowadzące do formularza — pełny gradient, przycisk w rogu */\n    #smartbees-lp-v2 .ben-grid .card.ben-cta {\n      cursor: pointer;\n      padding: 2rem 1.8rem 2rem;\n      display: flex; flex-direction: column;\n    }\n    #smartbees-lp-v2 .ben-grid .card.ben-cta::before {\n      background: linear-gradient(150deg, #f0602f 0%, #d74114 46%, #b8360e 100%);\n      clip-path: none;\n      border-radius: var(--radius-card);\n    }\n    #smartbees-lp-v2 .ben-grid .card.ben-cta .ben-eyebrow { display: none; }\n    #smartbees-lp-v2 .ben-grid .card.ben-cta .ben-num { display: none; }\n    #smartbees-lp-v2 .ben-grid .card.ben-cta .ben-title,\n    #smartbees-lp-v2 .ben-grid .card.ben-cta p { color: #fff; }\n    #smartbees-lp-v2 .ben-grid .card.ben-cta p { opacity: .9; }\n    #smartbees-lp-v2 .ben-grid .card.ben-cta .ben-top {\n      position: static; width: auto; height: auto; margin-top: auto; order: 9;\n      display: flex; justify-content: flex-end; padding-top: 1.6rem;\n    }\n    #smartbees-lp-v2 .ben-grid .card.ben-cta .ben-arrow {\n      display: inline-flex; align-items: center; gap: .5rem;\n      background: #fff; color: var(--accent-btn);\n      font: 600 .9rem/1 var(--font-body);\n      padding: .8rem 1.2rem; border-radius: var(--radius-pill);\n      transition: transform .25s, box-shadow .25s;\n    }\n    #smartbees-lp-v2 .ben-grid .card.ben-cta:hover .ben-arrow {\n      transform: translateX(3px);\n      box-shadow: 0 8px 20px -8px rgba(0, 0, 0, .5);\n    }\n\n    /* ===== topbar: bez numeru telefonu ===== */\n    #smartbees-lp-v2 .topbar .phone-link { display: none; }\n\n    /* ===== pływające CTA widoczne po scrollu ===== */\n    #sb-float-cta {\n      position: fixed; top: 20px; right: 24px; z-index: 9999;\n      display: inline-flex; align-items: center; gap: .5rem;\n      padding: .85rem 1.5rem;\n      background: var(--accent-btn, #d74114); color: #fff;\n      font: 600 .95rem/1 var(--font-body);\n      border-radius: 999px; text-decoration: none;\n      box-shadow: 0 12px 30px -10px rgba(0, 0, 0, .6), 0 2px 8px -2px rgba(0, 0, 0, .4);\n      opacity: 0; transform: translateY(-14px) scale(.96); pointer-events: none;\n      transition: opacity .3s ease, transform .3s ease, background .2s;\n    }\n    #sb-float-cta.is-visible { opacity: 1; transform: none; pointer-events: auto; }\n    #sb-float-cta:hover { background: #eb5627; transform: translateY(-1px); }\n    #sb-float-cta svg { transition: transform .2s; }\n    #sb-float-cta:hover svg { transform: translateX(3px); }\n\n    /* ===== Testimonials: ci\\u0105g\\u0142y pas kart z podgl\\u0105dem kolejnej ===== */\n    #smartbees-lp-v2 [data-module=\"testimonials
